name: deploy-vm

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, vm-prod]
    env:
      PHASE4_RELEASE_GATE_ENABLED: ${{ vars.PHASE4_RELEASE_GATE_ENABLED || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (release gate)
        if: ${{ env.PHASE4_RELEASE_GATE_ENABLED != 'false' }}
        run: npm ci

      - name: Phase 4 release gate
        if: ${{ env.PHASE4_RELEASE_GATE_ENABLED != 'false' }}
        env:
          SMOKE_JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          chmod +x scripts/quality/run-phase4-release-gate.sh
          scripts/quality/run-phase4-release-gate.sh

      - name: Deploy on VM runner
        env:
          DEPLOY_WORKDIR: /opt/erp-retail
          DEPLOY_ENV_FILE: /opt/erp-retail/.deploy.env
          AUTH_ENABLED: ${{ vars.AUTH_ENABLED || 'false' }}
          NEXT_PUBLIC_AUTH_ENABLED: ${{ vars.NEXT_PUBLIC_AUTH_ENABLED || 'false' }}
          PERMISSION_ENGINE_ENABLED: ${{ vars.PERMISSION_ENGINE_ENABLED || 'false' }}
          IAM_V2_ENABLED: ${{ vars.IAM_V2_ENABLED }}
          DEFAULT_TENANT_ID: ${{ vars.DEFAULT_TENANT_ID || 'GOIUUDAI' }}
          TENANCY_MODE: ${{ vars.TENANCY_MODE || 'single' }}
          API_PORT: ${{ vars.API_PORT || '3001' }}
          WEB_PORT: ${{ vars.WEB_PORT || '3000' }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'http://api:3001/api/v1' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
          REDIS_URL: ${{ vars.REDIS_URL || 'redis://redis:6379' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AI_OPENAI_COMPAT_BASE_URL: ${{ vars.AI_OPENAI_COMPAT_BASE_URL }}
          AI_OPENAI_COMPAT_API_KEY: ${{ secrets.AI_OPENAI_COMPAT_API_KEY }}
          AI_OPENAI_COMPAT_MODEL: ${{ vars.AI_OPENAI_COMPAT_MODEL || 'gpt-4o-mini' }}
          AI_OPENAI_COMPAT_TIMEOUT_MS: ${{ vars.AI_OPENAI_COMPAT_TIMEOUT_MS || '45000' }}
          BHTOT_API_KEY: ${{ secrets.BHTOT_API_KEY }}
          ZALO_OA_WEBHOOK_SECRET: ${{ secrets.ZALO_OA_WEBHOOK_SECRET }}
          ZALO_OA_OUTBOUND_URL: ${{ vars.ZALO_OA_OUTBOUND_URL }}
          ZALO_OA_ACCESS_TOKEN: ${{ secrets.ZALO_OA_ACCESS_TOKEN }}
          ZALO_OA_API_BASE_URL: ${{ vars.ZALO_OA_API_BASE_URL || 'https://openapi.zalo.me/v3.0/oa' }}
          ZALO_OA_OUTBOUND_TIMEOUT_MS: ${{ vars.ZALO_OA_OUTBOUND_TIMEOUT_MS || '20000' }}
          SETTINGS_ENCRYPTION_MASTER_KEY: ${{ secrets.SETTINGS_ENCRYPTION_MASTER_KEY }}
          SEARCH_ENGINE: ${{ vars.SEARCH_ENGINE || 'sql' }}
          MEILI_HOST: ${{ vars.MEILI_HOST || 'http://meilisearch:7700' }}
          MEILI_MASTER_KEY: ${{ secrets.MEILI_MASTER_KEY }}
          MEILI_INDEX_PREFIX: ${{ vars.MEILI_INDEX_PREFIX || 'erp' }}
          MEILI_TIMEOUT_MS: ${{ vars.MEILI_TIMEOUT_MS || '45000' }}
          MEILI_ENABLE_WRITE_SYNC: ${{ vars.MEILI_ENABLE_WRITE_SYNC || 'false' }}
          MEILI_PORT: ${{ vars.MEILI_PORT || '7700' }}
          AUDIT_ARCHIVE_S3_ENDPOINT: ${{ vars.AUDIT_ARCHIVE_S3_ENDPOINT || 'http://minio:9000' }}
          AUDIT_ARCHIVE_S3_BUCKET: ${{ vars.AUDIT_ARCHIVE_S3_BUCKET || 'erp-audit-archive' }}
          AUDIT_ARCHIVE_S3_REGION: ${{ vars.AUDIT_ARCHIVE_S3_REGION || 'us-east-1' }}
          AUDIT_ARCHIVE_S3_ACCESS_KEY: ${{ vars.AUDIT_ARCHIVE_S3_ACCESS_KEY || vars.MINIO_ROOT_USER || 'erpminio' }}
          AUDIT_ARCHIVE_S3_SECRET_KEY: ${{ secrets.AUDIT_ARCHIVE_S3_SECRET_KEY || secrets.MINIO_ROOT_PASSWORD }}
          AUDIT_ARCHIVE_S3_FORCE_PATH_STYLE: ${{ vars.AUDIT_ARCHIVE_S3_FORCE_PATH_STYLE || 'true' }}
          AUDIT_ARCHIVE_S3_TLS_ENABLED: ${{ vars.AUDIT_ARCHIVE_S3_TLS_ENABLED || 'false' }}
          AUDIT_MAINTENANCE_SCHEDULER_ENABLED: ${{ vars.AUDIT_MAINTENANCE_SCHEDULER_ENABLED || 'true' }}
          AUDIT_MAINTENANCE_SCHEDULER_UTC_HOUR: ${{ vars.AUDIT_MAINTENANCE_SCHEDULER_UTC_HOUR || '19' }}
          AUDIT_COLD_QUERY_MAX_DAYS: ${{ vars.AUDIT_COLD_QUERY_MAX_DAYS || '31' }}
          MINIO_PORT: ${{ vars.MINIO_PORT || '9000' }}
          MINIO_CONSOLE_PORT: ${{ vars.MINIO_CONSOLE_PORT || '9001' }}
          MINIO_ROOT_USER: ${{ vars.MINIO_ROOT_USER || 'erpminio' }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          POST_DEPLOY_AUTH_RBAC_SMOKE_ENABLED: ${{ vars.POST_DEPLOY_AUTH_RBAC_SMOKE_ENABLED || 'false' }}
          POST_DEPLOY_AUTH_RBAC_SMOKE_MODULES: ${{ vars.POST_DEPLOY_AUTH_RBAC_SMOKE_MODULES || 'sales,finance,crm' }}
        run: |
          chmod +x scripts/deploy/deploy-from-runner.sh
          scripts/deploy/deploy-from-runner.sh
