services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erp_retail}
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-REPLACE_WITH_SECURE_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: erp-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
      MEILI_NO_ANALYTICS: ${MEILI_NO_ANALYTICS:-true}
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meili_data:/meili_data

  minio:
    image: minio/minio:latest
    container_name: erp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-erpminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-REPLACE_WITH_SECURE_MINIO_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: erp-api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${API_DATABASE_URL:-postgresql://erp:erp@postgres:5432/erp_retail}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-GOIUUDAI}
      TENANCY_MODE: ${TENANCY_MODE:-single}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      DEV_AUTH_BYPASS_ENABLED: ${DEV_AUTH_BYPASS_ENABLED:-false}
      PERMISSION_ENGINE_ENABLED: ${PERMISSION_ENGINE_ENABLED:-true}
      IAM_V2_ENABLED: ${IAM_V2_ENABLED:-}
      API_PORT: ${API_PORT:-3001}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SETTINGS_ENCRYPTION_MASTER_KEY: ${SETTINGS_ENCRYPTION_MASTER_KEY:-}
      AI_OPENAI_COMPAT_BASE_URL: ${AI_OPENAI_COMPAT_BASE_URL:-}
      AI_OPENAI_COMPAT_API_KEY: ${AI_OPENAI_COMPAT_API_KEY:-}
      AI_OPENAI_COMPAT_MODEL: ${AI_OPENAI_COMPAT_MODEL:-gpt-4o-mini}
      AI_OPENAI_COMPAT_TIMEOUT_MS: ${AI_OPENAI_COMPAT_TIMEOUT_MS:-45000}
      BHTOT_API_KEY: ${BHTOT_API_KEY:-}
      ZALO_OA_WEBHOOK_SECRET: ${ZALO_OA_WEBHOOK_SECRET:-}
      ZALO_OA_OUTBOUND_URL: ${ZALO_OA_OUTBOUND_URL:-}
      ZALO_OA_ACCESS_TOKEN: ${ZALO_OA_ACCESS_TOKEN:-}
      ZALO_OA_API_BASE_URL: ${ZALO_OA_API_BASE_URL:-https://openapi.zalo.me/v3.0/oa}
      ZALO_OA_OUTBOUND_TIMEOUT_MS: ${ZALO_OA_OUTBOUND_TIMEOUT_MS:-20000}
      SEARCH_ENGINE: ${SEARCH_ENGINE:-sql}
      MEILI_HOST: ${MEILI_HOST:-http://meilisearch:7700}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
      MEILI_INDEX_PREFIX: ${MEILI_INDEX_PREFIX:-erp}
      MEILI_TIMEOUT_MS: ${MEILI_TIMEOUT_MS:-45000}
      MEILI_ENABLE_WRITE_SYNC: ${MEILI_ENABLE_WRITE_SYNC:-false}
      AUDIT_ARCHIVE_S3_ENDPOINT: ${AUDIT_ARCHIVE_S3_ENDPOINT:-http://minio:9000}
      AUDIT_ARCHIVE_S3_BUCKET: ${AUDIT_ARCHIVE_S3_BUCKET:-erp-audit-archive}
      AUDIT_ARCHIVE_S3_REGION: ${AUDIT_ARCHIVE_S3_REGION:-us-east-1}
      AUDIT_ARCHIVE_S3_ACCESS_KEY: ${AUDIT_ARCHIVE_S3_ACCESS_KEY:-erpminio}
      AUDIT_ARCHIVE_S3_SECRET_KEY: ${AUDIT_ARCHIVE_S3_SECRET_KEY:-REPLACE_WITH_SECURE_MINIO_PASSWORD}
      AUDIT_ARCHIVE_S3_FORCE_PATH_STYLE: ${AUDIT_ARCHIVE_S3_FORCE_PATH_STYLE:-true}
      AUDIT_ARCHIVE_S3_TLS_ENABLED: ${AUDIT_ARCHIVE_S3_TLS_ENABLED:-false}
      AUDIT_MAINTENANCE_SCHEDULER_ENABLED: ${AUDIT_MAINTENANCE_SCHEDULER_ENABLED:-true}
      AUDIT_MAINTENANCE_SCHEDULER_UTC_HOUR: ${AUDIT_MAINTENANCE_SCHEDULER_UTC_HOUR:-19}
      AUDIT_COLD_QUERY_MAX_DAYS: ${AUDIT_COLD_QUERY_MAX_DAYS:-31}
    depends_on:
      - postgres
      - redis
      - meilisearch
      - minio
    ports:
      - "${API_PORT:-3001}:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api:3001/api/v1}
        NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-true}
        NEXT_PUBLIC_DEV_AUTH_BYPASS_ENABLED: ${NEXT_PUBLIC_DEV_AUTH_BYPASS_ENABLED:-false}
    container_name: erp-web
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api:3001/api/v1}
      NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-true}
      NEXT_PUBLIC_DEV_AUTH_BYPASS_ENABLED: ${NEXT_PUBLIC_DEV_AUTH_BYPASS_ENABLED:-false}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
  meili_data:
  minio_data:
